x-airflow-common: &airflow-common
  image: apache/airflow:3.0.0
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW_CONN_POSTGRES_DSP: "postgresql://dsp:dsp@postgres:5432/dsp"
    MODEL_SERVICE_URL: "http://model_service:8000"
    RAW_DATA_DIR: "/data/raw"
    GOOD_DATA_DIR: "/data/good"
    BAD_DATA_DIR: "/data/bad"
    PROCESSED_DATA_DIR: "/data/processed"
    PREDICTED_DATA_DIR: "/data/predicted"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── PostgreSQL (single instance, two databases) ──────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # The entrypoint script creates additional DBs listed here
      POSTGRES_MULTIPLE_DATABASES: "dsp:dsp:dsp,airflow:airflow:airflow"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/pg-init-scripts:/docker-entrypoint-initdb.d
      - ./init.sql:/docker-entrypoint-initdb.d/02_app_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Model Service (FastAPI) ──────────────────────────────────────
  model_service:
    build:
      context: ./model_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://dsp:dsp@postgres:5432/dsp"
      MODEL_VERSION: "1.0.0"
      MODELS_DIR: "/app/models"
    volumes:
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Streamlit Web App ────────────────────────────────────────────
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    environment:
      API_URL: "http://model_service:8000"
    ports:
      - "8501:8501"
    depends_on:
      model_service:
        condition: service_healthy
    restart: unless-stopped

  # ── Airflow Init (one-shot) ──────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow connections add 'postgres_dsp' \
          --conn-type postgres \
          --conn-host postgres \
          --conn-schema dsp \
          --conn-login dsp \
          --conn-password dsp \
          --conn-port 5432 || true
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
    restart: "no"

  # ── Airflow Scheduler ────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Webserver ────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
