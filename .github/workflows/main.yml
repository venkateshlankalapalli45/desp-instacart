name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - name: Lint
        run: |
          flake8 model_service/ webapp/ scripts/ dags/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git,.venv

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn pydantic fastapi \
                      sqlalchemy psycopg2-binary pytest pytest-cov
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts:${{ github.workspace }}/model_service:${{ github.workspace }}
