name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 model_service/ webapp/ scripts/ dags/ ml/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git,.venv

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            pandas \
            numpy \
            scikit-learn \
            joblib \
            pydantic \
            fastapi \
            sqlalchemy \
            psycopg2-binary \
            pytest \
            pytest-cov

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_api_schema.py \
            -v \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing

      - name: Run schema tests
        run: |
          pytest tests/test_api_schema.py \
            -v \
            --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/model_service:${{ github.workspace }}
